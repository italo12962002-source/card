<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{
            background: linear-gradient(-100deg, #7f86e9, #ffffff, #1e1af8);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: #000000;
        }
        @keyframes gradientBG{
            0%{background-position: 0% 50%;}
            50%{background-position: 100% 50%;}
            100%{background-position: 0% 50%;}
        }

        .card{
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgb(0, 0, 0);
        }
        .imgperfil{
            width: 180px;
            height: 200px;
            background-color: rgb(103, 106, 250);
            padding: 5px;
            border-radius: 45px;
            box-shadow: 0 10px 25px rgb(0, 0, 0);
            margin-bottom: 15px;
            object-fit: fill;
        }
        h2{
            margin: 10px 0 5px;
            font-size: 30px;
        }
        .local{
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .job{
            font-size: 16px;
            line-height: 1.5;
        }
        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn{
            color: black;
            background-color: rgba(184, 184, 184, 0.356);
            text-decoration: none;
            padding: 10px 10px;
            border-radius: 6px;
            border: 2px solid rgb(18, 21, 196);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover{
            opacity: 0.8;
            background: rgb(165, 165, 165);
        }
        .skills{
            margin-top: 20px;
        text-align: left;        
        }
        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag{
            border: 1px solid #283cf3;
            padding: 5px 10px;
        }
        .social-midia{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }
        .social-midia i{
            cursor: pointer;
            transition: 0.1s;
        }
        .social-midia i:hover{
            color: #a509ff;
            transform: scale(1.1);
        }
        .social-midia a{
            text-decoration: none;
            color: rgb(111, 95, 255)
        }
        .social-midia a:hover{
            color: #0d23eb;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="italo.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Italo Samuel Souza Santos</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Técnico em Informática - SENAC<br>Bacharel em Administração - UFMG</div>
         
        <div class="botoes">
            <a href="https://wa.me/5538998760759?text=Olá,%20vim%20pelo%20card." class="btn primario"> Mensagem</a>
            <a href="https://instagram.com/italo_samueel" class="btn secundario">Follow</a>
        </div>
         <div class="skills">
            <h3>Habilidades</h3>
            <div class="tags">
                <span class="tag">Raciocínio Lógico</span><br>
                <span class="tag">Resolução de Problemas</span><br>
                <span class="tag">Autodidata</span><br>
                <span class="tag">Pensamento Analítico</span><br>
                <span class="tag">Boa Comunicação</span><br>
                <span class="tag">Visão Analitica</span><br>
                <span class="tag">Adaptabilidade</span><br>
                <span class="tag"> Liderança e Treinamento</span><br>   

            </div>

         </div>
         <div class="social-midia">
            <a href="https://github.com/italo12962002-source"><i class="fab - fa-github"></i></a>
            <a href="https://www.linkedin.com/in/italo-samuel-360a00372/"><i  class="fab - fa-linkedin"></i></a>
            <a href="https://www.instagram.com/italo_samueel/"><i class="fab - fa-instagram"></i></a>
         </div>
    </div>
    
</body>
</html>
