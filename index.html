<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #5f7bf7;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(0, 0, 0);
        }
        .card{
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgb(0, 0, 0);
        }
        .imgperfil{
            width: 180px;
            height: 200px;
            background-color: rgb(103, 106, 250);
            padding: 5px;
            border-radius: 45px;
            box-shadow: 0 10px 25px rgb(0, 0, 0);
            margin-bottom: 15px;
            object-fit: fill;
        }
        h2{
            margin: 10px 0 5px;
            font-size: 30px;
        }
        .local{
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .job{
            font-size: 16px;
            line-height: 1.5;
        }
        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn{
            padding: 10px 10px;
            border-radius: 6px;
            border: 2px solid rgb(2, 7, 255);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover{
            opacity: 0.8;
            background: rgb(165, 165, 165);
        }
        .skills{
            margin-top: 20px;
        text-align: left;        
        }
        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag{
            border: 1px solid #0d23eb;
            padding: 5px 10px;
        }
        .social-midia{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }
        .social-midia i{
            cursor: pointer;
            transition: 0.1s;
        }
        .social-midia i:hover{
            color: #1d56f3;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="Imagem/Italo.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Italo Samuel Souza Santos</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Técnico em Informática - SENAC<br>Bacharel em Administração - UFMG</div>
         
        <div class="botoes">
            <button class="btn primario">Mensagem</button>
            <button class="btn secundario">Follow</button>
        </div>
         <div class="skills">
            <h3>Habilidades</h3>
            <div class="tags">
                <span class="tag">Raciocínio Lógico</span><br>
                <span class="tag">Resolução de Problemas</span><br>
                <span class="tag">Autodidata</span><br>
                <span class="tag">Pensamento Analítico</span><br>
                <span class="tag">Boa Comunicação</span><br>
                <span class="tag">Visão Analitica</span><br>
                <span class="tag">Adaptabilidade</span><br>
                <span class="tag"> Liderança e Treinamento</span><br>   

            </div>

         </div>
         <div class="social-midia">
            <i class="fab - fa-facebook"></i>
            <i class="fab - fa-github"></i>
            <i class="fab - fa-linkedin"></i>
            <i class="fab - fa-instagram"></i>
         </div>
    </div>
    
</body>
</html>
